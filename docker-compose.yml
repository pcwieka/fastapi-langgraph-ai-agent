services:
  ecommerce-agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Hot reload for development — watches app/ for changes
    # Remove --reload and the volume mount for production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      - ./data:/app/data
